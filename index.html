<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدى الطفولة | سالي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0b0f19;
            --card: #161e2e; --text: #ffffff; --accent: #ff9800;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 40px 0; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        header h1 { margin: 0; font-size: 2.2rem; font-weight: 900; }
        .main-container { max-width: 900px; width: 95%; margin: 30px auto; }
        .video-wrapper { background: #000; border-radius: 20px; overflow: hidden; border: 3px solid var(--primary); box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2); margin-bottom: 30px; display: none; position: relative; }
        .responsive-iframe { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .responsive-iframe iframe { position: absolute; top: -155px; left: 0; width: 100%; height: calc(100% + 155px); border: 0; }
        .video-footer { padding: 15px; background: var(--card); text-align: center; font-weight: bold; color: var(--primary); border-top: 1px solid rgba(255,255,255,0.1); }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 12px; }
        .ep-btn { background: #252f44; color: white; padding: 15px 0; border-radius: 12px; font-size: 1.1rem; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s ease; }
        .ep-btn:hover { background: var(--primary); color: #000; }
        .ep-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        footer { margin: 40px 0; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>🎬 صدى الطفولة</h1>
    <p>سالي - كامل 46 حلقة</p>
</header>

<div class="main-container">
    <div id="videoContainer" class="video-wrapper">
        <div class="responsive-iframe">
            <iframe id="mainIframe" src="" frameborder="0" allowfullscreen="true" scrolling="no"></iframe>
        </div>
        <div id="epTitle" class="video-footer">أنت تشاهد الآن: سالي - حلقة <span id="epNumText"></span></div>
    </div>

    <div class="episodes-container" style="background: var(--card); padding: 25px; border-radius: 20px;">
        <div class="episodes-grid" id="buttonsGrid"></div>
    </div>
</div>

<footer>
    <p>جميع الحقوق محفوظة لـ صدى الطفولة &copy; 2026</p>
</footer>

<script>
    const grid = document.getElementById('buttonsGrid');
    const container = document.getElementById('videoContainer');
    const iframe = document.getElementById('mainIframe');
    const epNumDisplay = document.getElementById('epNumText');
    const totalEpisodes = 46; 

    for (let i = 1; i <= totalEpisodes; i++) {
        const btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.innerText = i;
        
        // الحساب لسالي: حلقة 1 = 691
        let episodeId = 690 + i;

        const link = `https://cartoony.net/watch/96/${episodeId}`;

        btn.onclick = function() {
            // الوحدة الإعلانية
            window.open('https://www.profitablecpmratenetwork.com/e41dj2h87?key=bef514b5ca3fa945e7a3b60e4a9ef21a', '_blank');
            
            container.style.display = 'block';
            iframe.src = link;
            epNumDisplay.innerText = i;
            
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        grid.appendChild(btn);
    }
</script>

</body>
</html>
